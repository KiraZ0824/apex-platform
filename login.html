<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemiCore - 登录/注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .tab-btn.active {
            color: #1890ff;
            border-bottom: 2px solid #1890ff;
            font-weight: 600;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md login-card overflow-hidden">
        <div class="p-8">
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="award" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-bold text-gray-900 tracking-wider">RemiCore</span>
            </div>

            <div class="flex border-b border-gray-200 mb-6">
                <button class="tab-btn active flex-1 py-3 text-sm text-gray-500 hover:text-gray-900 transition-colors" data-target="login-pwd">密码登录</button>
                <button class="tab-btn flex-1 py-3 text-sm text-gray-500 hover:text-gray-900 transition-colors" data-target="login-email">邮箱/验证码登录</button>
            </div>

            <!-- 密码登录表单 -->
            <div id="login-pwd" class="tab-content block">
                <form class="space-y-5" onsubmit="event.preventDefault(); window.location.href='ui-preview.html';">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">账号/邮箱/手机号</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="text" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="请输入账号">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">密码</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="password" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="请输入密码">
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded text-blue-500 focus:ring-blue-500 w-4 h-4">
                            <span class="text-xs text-gray-600">记住密码 (7天)</span>
                        </label>
                        <a href="#" class="text-xs text-blue-500 hover:underline">忘记密码？</a>
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-blue-600 transition-colors shadow-sm">
                        登录
                    </button>
                </form>
            </div>

            <!-- 邮箱/验证码登录表单 -->
            <div id="login-email" class="tab-content hidden">
                <form class="space-y-5" onsubmit="event.preventDefault(); window.location.href='ui-preview.html';">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">邮箱 / 手机号</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="text" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="请输入领英注册邮箱或手机号">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">验证码</label>
                        <div class="flex gap-3">
                            <div class="relative flex-1">
                                <i data-lucide="shield-check" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                                <input type="text" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="请输入验证码">
                            </div>
                            <button type="button" class="px-4 py-2 border border-gray-300 rounded-lg text-xs font-medium text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap">
                                获取验证码
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-blue-600 transition-colors shadow-sm mt-6">
                        登录 / 注册
                    </button>
                </form>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-500 mb-4">其他登录方式</p>
                <div class="flex justify-center gap-4">
                    <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 transition-colors text-gray-600" title="领英授权登录">
                        <i data-lucide="linkedin" class="w-5 h-5"></i>
                    </button>
                    <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 transition-colors text-gray-600" title="特邀码注册">
                        <i data-lucide="key" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(e.target.getAttribute('data-target')).classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
